services:
  # Node.js Express Backend Service
  - type: web
    name: sspl-admin-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free

  # React Static Frontend Service
  - type: web
    name: sspl-admin-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
